// ══════════════════════════════════════════════════════
// PNG 圖片匯出 / 匯入
// ══════════════════════════════════════════════════════

const PNG_KEYWORD = 'HVBreakDeck';

// CRC32 查表（PNG chunk 必需）
const CRC32_TABLE = (() => {
  const t = new Uint32Array(256);
  for (let i = 0; i < 256; i++) {
    let c = i;
    for (let j = 0; j < 8; j++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
    t[i] = c;
  }
  return t;
})();

function crc32(buf) {
  let crc = 0xFFFFFFFF;
  for (let i = 0; i < buf.length; i++) crc = CRC32_TABLE[(crc ^ buf[i]) & 0xFF] ^ (crc >>> 8);
  return (crc ^ 0xFFFFFFFF) >>> 0;
}

// 把 tEXt chunk 注入 PNG bytes（插在第一個 IDAT 之前）
function injectPngChunk(pngBytes, keyword, text) {
  const enc = new TextEncoder();
  const kw  = enc.encode(keyword);
  const tx  = enc.encode(text);
  const data = new Uint8Array(kw.length + 1 + tx.length);
  data.set(kw); data[kw.length] = 0; data.set(tx, kw.length + 1);

  const typeArr = new Uint8Array([116,69,88,116]); // 'tEXt'
  const crcIn   = new Uint8Array(4 + data.length);
  crcIn.set(typeArr); crcIn.set(data, 4);
  const crcVal  = crc32(crcIn);

  const chunk = new Uint8Array(12 + data.length);
  const dv    = new DataView(chunk.buffer);
  dv.setUint32(0, data.length, false);
  chunk.set(typeArr, 4);
  chunk.set(data, 8);
  dv.setUint32(8 + data.length, crcVal, false);

  // 找 IDAT 位置
  let pos = 8;
  while (pos + 8 <= pngBytes.length) {
    const len  = new DataView(pngBytes.buffer, pngBytes.byteOffset + pos).getUint32(0, false);
    const type = String.fromCharCode(pngBytes[pos+4], pngBytes[pos+5], pngBytes[pos+6], pngBytes[pos+7]);
    if (type === 'IDAT') break;
    pos += 12 + len;
  }

  const out = new Uint8Array(pngBytes.length + chunk.length);
  out.set(pngBytes.slice(0, pos));
  out.set(chunk, pos);
  out.set(pngBytes.slice(pos), pos + chunk.length);
  return out;
}

// 從 PNG bytes 讀取我們的 tEXt chunk
function readPngChunk(pngBytes, keyword) {
  const dec = new TextDecoder();
  let pos = 8;
  while (pos + 8 <= pngBytes.length) {
    const dv   = new DataView(pngBytes.buffer, pngBytes.byteOffset + pos);
    const len  = dv.getUint32(0, false);
    const type = String.fromCharCode(pngBytes[pos+4], pngBytes[pos+5], pngBytes[pos+6], pngBytes[pos+7]);
    if (type === 'IEND') break;
    if (type === 'tEXt' && pos + 8 + len <= pngBytes.length) {
      const data = pngBytes.slice(pos + 8, pos + 8 + len);
      const sep  = data.indexOf(0);
      if (sep !== -1 && dec.decode(data.slice(0, sep)) === keyword) {
        return dec.decode(data.slice(sep + 1));
      }
    }
    pos += 12 + len;
  }
  return null;
}

// 圓角矩形輔助（相容舊瀏覽器）
function canvasRoundRect(ctx, x, y, w, h, r) {
  const [tl, tr, br, bl] = typeof r === 'number' ? [r,r,r,r] : r;
  ctx.beginPath();
  ctx.moveTo(x + tl, y);
  ctx.lineTo(x + w - tr, y);   ctx.quadraticCurveTo(x+w, y,   x+w, y+tr);
  ctx.lineTo(x + w, y + h - br); ctx.quadraticCurveTo(x+w, y+h, x+w-br, y+h);
  ctx.lineTo(x + bl, y + h);   ctx.quadraticCurveTo(x,   y+h, x,   y+h-bl);
  ctx.lineTo(x, y + tl);       ctx.quadraticCurveTo(x,   y,   x+tl, y);
  ctx.closePath();
}

// 畫牌組 Canvas（高解析度）
async function drawDeckCanvas(deck) {
  const SCALE  = 3;          // 3x 高解析度
  const entries = expandEntriesForCanvasGrouped(deck);

  // 欄數：≤5張用實際張數寬度，>5張固定5欄
  const COLS   = Math.min(5, entries.length);

  const CARD_W = 100;        // 邏輯尺寸（實際 ×SCALE）
  const CARD_H = 140;
  const GAP    = 10;
  const PAD    = 20;
  const HEAD_H = 56;         // 兩列：品牌名 + 牌組名/統計合併列
  const FOOT_H = 34;

  const rows = Math.ceil(entries.length / COLS);
  const W    = PAD*2 + COLS*(CARD_W+GAP) - GAP;
  const H    = HEAD_H + PAD + rows*(CARD_H+GAP) - GAP + PAD + FOOT_H;

  const canvas  = document.createElement('canvas');
  canvas.width  = W * SCALE;
  canvas.height = H * SCALE;
  const ctx     = canvas.getContext('2d');
  ctx.scale(SCALE, SCALE);               // 之後所有座標用邏輯尺寸即可
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';

  // 背景
  ctx.fillStyle = '#0f0f13';
  ctx.fillRect(0, 0, W, H);

  // 標題列
  ctx.fillStyle = '#13091f';
  ctx.fillRect(0, 0, W, HEAD_H);
  ctx.fillStyle = '#6c63ff';
  ctx.fillRect(0, HEAD_H - 2, W, 2);

  // 第一列：品牌名（左）
  ctx.font = 'bold 15px "Segoe UI","Noto Sans TC",sans-serif';
  ctx.fillStyle = '#6c63ff';
  ctx.textAlign = 'left';
  ctx.fillText('排球少年!! バボカ!!BREAK', PAD, 22);

  // 第二列：牌組名（左）+ 統計＋共N張（右）
  const ROW2_Y = 44;
  ctx.font = 'bold 17px "Segoe UI","Noto Sans TC",sans-serif';
  ctx.fillStyle = '#e8e8f0';
  ctx.textAlign = 'left';
  ctx.fillText(deck.name, PAD, ROW2_Y);

  // 右側：先量「共 N 張」寬度，再左推統計列
  const totalTxt = `共 ${getTotalCount(deck)} 張`;
  ctx.font = '11px "Segoe UI",sans-serif';
  const totalTxtW = ctx.measureText(totalTxt).width;

  const colorStats = getColorStats(deck);
  const evCnt = getEventCount(deck);
  const statsItems = [
    ...COLOR_TAGS.map(({ key, label, hex }) => ({ label, hex, val: String(colorStats[key]) })),
    { label: '事件', hex: EVENT_COLOR_HEX, val: `${evCnt}/8` },
  ];
  const DOT_R    = 3.5;
  const ITEM_GAP = 10;
  const STATS_TOTAL_GAP = 8; // 統計列與「共 N 張」之間距

  ctx.font = '10px "Segoe UI","Noto Sans TC",sans-serif';
  // 量出所有 stats 總寬
  const statsWidths = statsItems.map(({ label, val }) => {
    const txt = `${label} ${val}`;
    return DOT_R * 2 + 4 + ctx.measureText(txt).width;
  });
  const totalStatsW = statsWidths.reduce((s, w) => s + w, 0) + ITEM_GAP * (statsItems.length - 1);

  // 統計列起始 X（由右往左算：PAD + totalTxtW + gap + totalStatsW）
  let sx = W - PAD - totalTxtW - STATS_TOTAL_GAP - totalStatsW;
  for (let i = 0; i < statsItems.length; i++) {
    const { label, hex, val } = statsItems[i];
    ctx.beginPath();
    ctx.arc(sx + DOT_R, ROW2_Y - DOT_R - 1, DOT_R, 0, Math.PI * 2);
    ctx.fillStyle = hex;
    ctx.fill();
    sx += DOT_R * 2 + 4;
    const txt = `${label} ${val}`;
    ctx.fillStyle = '#b0b0c8';
    ctx.textAlign = 'left';
    ctx.fillText(txt, sx, ROW2_Y);
    sx += statsWidths[i] - (DOT_R * 2 + 4) + ITEM_GAP;
  }

  // 「共 N 張」最右
  ctx.font = '11px "Segoe UI",sans-serif';
  ctx.fillStyle = '#8888aa';
  ctx.textAlign = 'right';
  ctx.fillText(totalTxt, W - PAD, ROW2_Y);
  ctx.textAlign = 'left';

  // 載入圖片（快取避免重複請求）
  const imgCache = {};
  const loadImg  = src => {
    if (imgCache[src]) return imgCache[src];
    imgCache[src] = new Promise(res => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload  = () => res(img);
      img.onerror = () => res(null);
      img.src = src;
    });
    return imgCache[src];
  };

  for (let i = 0; i < entries.length; i++) {
    const entry = entries[i];
    const card  = cards.find(c => c.image_file === entry.image_file);
    if (!card) continue;

    const col = i % COLS;
    const row = Math.floor(i / COLS);
    const x   = PAD + col * (CARD_W + GAP);
    const y   = HEAD_H + PAD + row * (CARD_H + GAP);

    // 卡片底色
    ctx.fillStyle = '#1a1a24';
    canvasRoundRect(ctx, x, y, CARD_W, CARD_H, 7); ctx.fill();

    // 卡片圖片
    if (card.image_file) {
      const img = await loadImg(`images/${card.image_file}`);
      if (img) {
        ctx.save();
        canvasRoundRect(ctx, x, y, CARD_W, CARD_H, 7); ctx.clip();
        ctx.drawImage(img, x, y, CARD_W, CARD_H);
        ctx.restore();
      }
    }

    // 底部漸層＋卡名
    const grad = ctx.createLinearGradient(x, y + CARD_H - 36, x, y + CARD_H);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(0,0,0,0.9)');
    ctx.fillStyle = grad;
    canvasRoundRect(ctx, x, y + CARD_H - 36, CARD_W, 36, [0,0,7,7]); ctx.fill();

    ctx.font = '10px "Segoe UI","Noto Sans TC",sans-serif';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    const variant = getVariantCode(entry.image_file);
    const nm = (card.card_no || '') + (variant ? `-${variant}` : '');
    ctx.fillText(nm, x + CARD_W/2, y + CARD_H - 8);
    ctx.textAlign = 'left';

    // 數量徽章（>1 才顯示）
    if (entry.count > 1) {
      const bw = 22, bh = 17;
      ctx.fillStyle = 'rgba(108,99,255,0.92)';
      canvasRoundRect(ctx, x + CARD_W - bw - 4, y + 4, bw, bh, 5); ctx.fill();
      ctx.font = 'bold 11px "Segoe UI",sans-serif';
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.fillText(`×${entry.count}`, x + CARD_W - bw/2 - 4, y + 15);
      ctx.textAlign = 'left';
    }

    // 顏色外框
    if (entry.borderColor) {
      const brd = 3;
      ctx.strokeStyle = entry.borderColor;
      ctx.lineWidth = brd;
      canvasRoundRect(ctx, x + brd/2, y + brd/2, CARD_W - brd, CARD_H - brd, 5.5);
      ctx.stroke();
    }
  }

  // 頁尾
  ctx.fillStyle = '#2e2e40';
  ctx.fillRect(0, H - FOOT_H, W, 1);
  ctx.font = '10px "Segoe UI",sans-serif';
  ctx.fillStyle = '#44445a';
  ctx.textAlign = 'center';
  ctx.fillText(
    `weilun2022.github.io/haikyuu-cards  ·  ${new Date().toLocaleDateString('zh-TW')}`,
    W/2, H - 11
  );
  ctx.textAlign = 'left';

  return canvas;
}

// 匯出圖片（PNG + 嵌入牌組資料）
async function exportDeckAsImage() {
  const deck = getCurrentDeck();
  if (!deck || deck.cards.length === 0) { showToast('牌組是空的！'); return; }

  const total  = getTotalCount(deck);
  const evCnt  = getEventCount(deck);
  const errors = [];
  if (total > 40)          errors.push(`總張數 ${total} 張（上限 40）`);
  if (evCnt > MAX_EVENT)   errors.push(`事件卡 ${evCnt} 張（上限 8）`);
  if (errors.length) { showToast(`⚠️ 無法輸出：${errors.join('　')}`); return; }

  showToast('圖片生成中...');
  try {
    const canvas  = await drawDeckCanvas(deck);
    const dataUrl = canvas.toDataURL('image/png');
    const bin     = atob(dataUrl.split(',')[1]);
    const bytes   = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);

    const payload  = JSON.stringify({ name: deck.name, cards: deck.cards, colors: deckColorState[deck.id] || {} });
    const injected = injectPngChunk(bytes, PNG_KEYWORD, payload);

    const blob = new Blob([injected], { type: 'image/png' });
    const url  = URL.createObjectURL(blob);
    const safe = deck.name.replace(/[^\w\u4e00-\u9fff\-]/g, '_');
    Object.assign(document.createElement('a'), {
      href: url,
      download: `HVBreak-${safe}-${new Date().toISOString().slice(0,10)}.png`
    }).click();
    URL.revokeObjectURL(url);
    showToast('圖片已下載！');
  } catch(e) {
    console.error(e);
    showToast('圖片生成失敗，請確認主控台訊息');
  }
}

// 從圖片匯入牌組
async function importDeckFromImage(file) {
  try {
    const buf      = await file.arrayBuffer();
    const bytes    = new Uint8Array(buf);
    const SIG      = [137,80,78,71,13,10,26,10];
    const validPng = SIG.every((b,i) => bytes[i] === b);
    if (!validPng) { showToast('不是有效的 PNG 圖片'); return; }

    const text = readPngChunk(bytes, PNG_KEYWORD);
    if (!text) { showToast('此圖片不含牌組資料'); return; }

    const data = JSON.parse(text);
    if (!Array.isArray(data.cards)) { showToast('牌組資料格式錯誤'); return; }

    const newDeck = { id: makeDeckId(), name: data.name || '匯入的牌組', cards: data.cards, owned: {} };
    decks.push(newDeck);
    currentDeckId = newDeck.id;
    saveDecks();
    if (data.colors && typeof data.colors === 'object') {
      deckColorState[newDeck.id] = data.colors;
      saveColorState();
    }
    renderDeckSwitcher(); renderDeckPanel(); updateTray(); renderGrid();
    showToast(`已匯入「${newDeck.name}」！`);
  } catch(e) {
    console.error(e);
    showToast('匯入失敗');
  }
}

// ── Variant Code Helper ─────────────────────────────────
// 從 image_file 萃取變體碼，例如 HV-P01-004-KP.webp → "KP"
// 若最後片段是純數字（非特殊版本）就回傳空字串
function getVariantCode(image_file) {
  if (!image_file) return '';
  const m = image_file.match(/-([^-]+)\.webp$/i);
  if (!m) return '';
  const code = m[1];
  return /^\d+$/.test(code) ? '' : code;  // 純數字表示無特殊版本
}

// ── Qty Modal ───────────────────────────────────────────
function openQtyModal(image_file) {
  if (!image_file) return;
  qtyPendingImageFile = image_file;
  const cardObj = cards.find(c => c.image_file === image_file);
  const variant = getVariantCode(image_file);
  const nm = (cardObj ? cardObj.name : image_file) + (variant ? ` (${variant})` : '');
  document.getElementById('qty-modal-name').textContent = nm;
  const deck = getCurrentDeck();

  const input = document.getElementById('qty-input');
  input.value = 1;
  input.max = Math.max(1, remaining);
  document.getElementById('qty-overlay').classList.add('open');
  setTimeout(() => input.select(), 50);
}

function closeQtyModal() {
  qtyPendingImageFile = null;
  document.getElementById('qty-overlay').classList.remove('open');
}

// ── Color Mode ──────────────────────────────────────────
function buildColorModeSlots() {
  const deck = getCurrentDeck();
  if (!deck) return [];
  const slots = [];
  for (const entry of deck.cards) {
    const card = cards.find(c => c.image_file === entry.image_file);
    const isEvent = card && card.category === 'EVENT';
    const colorMap = isEvent ? null : getCardColorMap(deck.id, entry.image_file);
    const slotColors = Array(entry.count).fill(null);
    if (isEvent) {
      slotColors.fill('event');
    } else if (colorMap) {
      let idx = 0;
      for (const { key } of COLOR_TAGS) {
        const cnt = colorMap[key] || 0;
        for (let i = 0; i < cnt && idx < slotColors.length; i++) slotColors[idx++] = key;
      }
    }
    for (let i = 0; i < entry.count; i++)
      slots.push({ imageFile: entry.image_file, slotIndex: i, color: slotColors[i], isEvent });
  }
  // 依 slot 自身顏色排序（同色聚集），同色內再依卡號排
  const SLOT_COLOR_ORD = { free: 0, receive: 1, set: 2, attack: 3, event: 4 };
  slots.sort((a, b) => {
    const aO = a.color !== null ? (SLOT_COLOR_ORD[a.color] ?? 5) : 5;
    const bO = b.color !== null ? (SLOT_COLOR_ORD[b.color] ?? 5) : 5;
    if (aO !== bO) return aO - bO;
    const ca = cards.find(x => x.image_file === a.imageFile);
    const cb = cards.find(x => x.image_file === b.imageFile);
    return ((ca && ca.card_no) || '').localeCompare((cb && cb.card_no) || '');
  });
  return slots;
}

function renderColorModeGrid() {
  const list = document.getElementById('deck-card-list');
  list.style.display = 'none';

  let grid = document.getElementById('deck-color-grid');
  if (!grid) {
    grid = document.createElement('div');
    grid.id = 'deck-color-grid';
    grid.className = 'color-mode-grid';
    list.parentNode.insertBefore(grid, list.nextSibling);
  }
  grid.innerHTML = '';

  colorModeSlots.forEach((slot, idx) => {
    const thumb = document.createElement('div');
    const colorClass = slot.color ? `c-${slot.color}` : '';
    thumb.className = ['color-mode-thumb', colorClass,
      colorModeSelectedIndices.has(idx) ? 'selected' : ''].filter(Boolean).join(' ');
    thumb.innerHTML = `<img src="images/${slot.imageFile}" alt="" onerror="this.style.background='var(--border)'">`;
    if (!slot.isEvent) {
      thumb.addEventListener('click', () => {
        if (colorModeSelectedIndices.has(idx)) {
          colorModeSelectedIndices.delete(idx);
          thumb.classList.remove('selected');
        } else {
          colorModeSelectedIndices.add(idx);
          thumb.classList.add('selected');
        }
        document.getElementById('color-pick-count').textContent = `已選 ${colorModeSelectedIndices.size} 張`;
      });
    }
    grid.appendChild(thumb);
  });
}

function toggleColorMode() {
  colorModeActive = !colorModeActive;
  if (colorModeActive) {
    colorModeSlots = buildColorModeSlots();
    colorModeSelectedIndices.clear();
  } else {
    colorModeSlots = [];
    colorModeSelectedIndices.clear();
  }
  const btn = document.getElementById('deck-color-mode-btn');
  btn.textContent = colorModeActive ? '✕ 結束上色' : '🎨 上色';
  btn.classList.toggle('active', colorModeActive);
  document.getElementById('deck-color-picker-bar').classList.toggle('show', colorModeActive);
  document.getElementById('deck-panel').classList.toggle('color-mode-open', colorModeActive);
  document.getElementById('color-pick-count').textContent = '已選 0 張';
  renderDeckPanel();
}

function applyBatchColor(colorKey) {
  if (colorModeSelectedIndices.size === 0) { showToast('請先選取卡片'); return; }
  const deck = getCurrentDeck();
  if (!deck) return;

  // 套用顏色至選取的 slot
  for (const idx of colorModeSelectedIndices) {
    const slot = colorModeSlots[idx];
    if (!slot || slot.isEvent) continue;
    slot.color = colorKey || null;
  }
  colorModeSelectedIndices.clear();

  // 從 slots 重新計算每張卡的 colorMap
  const cardSlotColors = {};
  for (const slot of colorModeSlots) {
    if (slot.isEvent) continue;
    if (!cardSlotColors[slot.imageFile]) cardSlotColors[slot.imageFile] = [];
    cardSlotColors[slot.imageFile].push(slot.color);
  }
  for (const [imgFile, slotColors] of Object.entries(cardSlotColors)) {
    const colorMap = {};
    for (const { key } of COLOR_TAGS) colorMap[key] = 0;
    let hasColor = false;
    for (const c of slotColors) {
      if (c && colorMap[c] !== undefined) { colorMap[c]++; hasColor = true; }
    }
    if (hasColor) setCardColorMap(deck.id, imgFile, colorMap);
    else clearCardColorMap(deck.id, imgFile);
  }
  saveDecks();

  // 套色後依顏色 + 卡號排序（多數決：數量最多的色決定排序位置）
  function getColorOrder(entry) {
    const c = cards.find(x => x.image_file === entry.image_file);
    if (!c) return 99;
    if (c.category === 'EVENT') return COLOR_TAGS.length;
    const cm = getCardColorMap(deck.id, entry.image_file);
    if (!cm) return COLOR_TAGS.length + 1;
    let maxCnt = 0, maxIdx = COLOR_TAGS.length + 1;
    for (let i = 0; i < COLOR_TAGS.length; i++) {
      const cnt = cm[COLOR_TAGS[i].key] || 0;
      if (cnt > maxCnt) { maxCnt = cnt; maxIdx = i; }
    }
    return maxIdx;
  }
  deck.cards.sort((a, b) => {
    const diff = getColorOrder(a) - getColorOrder(b);
    if (diff !== 0) return diff;
    const ca = cards.find(x => x.image_file === a.image_file);
    const cb = cards.find(x => x.image_file === b.image_file);
    return ((ca && ca.card_no) || '').localeCompare((cb && cb.card_no) || '');
  });
  saveDecks();
  colorModeSlots = buildColorModeSlots();

  // 更新統計列
  const stats = getColorStats(deck);
  const statsEl = document.getElementById('deck-color-stats');
  if (statsEl) {
    const statsRow = [
      ...COLOR_TAGS.map(({ key, label, hex }) => ({ label, hex, count: stats[key] })),
      { label: '事件', hex: EVENT_COLOR_HEX, count: stats.event }
    ];
    statsEl.innerHTML = statsRow.map(({ label, hex, count }) =>
      `<span class="deck-color-stat-item">
         <span class="deck-color-dot" style="background:${hex}"></span>${label} ${count}
       </span>`
    ).join('');
  }

  document.getElementById('color-pick-count').textContent = '已選 0 張';
  renderColorModeGrid();
}

// ── Reorganize Deck ─────────────────────────────────────
const RARITY_SORT_ORDER = { '秘':0, '頂P':1, '頂':2, 'S':3, 'R':4, 'N':5, 'D':6, 'P':7 };

function reorganizeDeck(mode) {
  const deck = getCurrentDeck();
  if (!deck || deck.cards.length === 0) return;

  function getCard(entry) { return cards.find(c => c.image_file === entry.image_file); }

  function getColorOrder(entry) {
    const card = getCard(entry);
    if (!card) return 99;
    if (card.category === 'EVENT') return COLOR_TAGS.length;
    const colorMap = getCardColorMap(deck.id, entry.image_file);
    if (!colorMap) return COLOR_TAGS.length + 1;
    let maxCnt = 0, maxIdx = COLOR_TAGS.length + 1;
    for (let i = 0; i < COLOR_TAGS.length; i++) {
      const cnt = colorMap[COLOR_TAGS[i].key] || 0;
      if (cnt > maxCnt) { maxCnt = cnt; maxIdx = i; }
    }
    return maxIdx;
  }

  const TOAST = { color:'已依顏色整理', srv:'已依發球值整理', blk:'已依攔網值整理',
                  rcv:'已依接球值整理', tos:'已依舉球值整理', atk:'已依攻擊值整理',
                  card_no:'已依卡號整理', rarity:'已依稀有度整理' };

  deck.cards.sort((a, b) => {
    const ca = getCard(a), cb = getCard(b);
    if (mode === 'color') {
      const diff = getColorOrder(a) - getColorOrder(b);
      if (diff !== 0) return diff;
      return ((ca && ca.card_no) || '').localeCompare((cb && cb.card_no) || '');
    }
    if (mode === 'card_no') {
      return ((ca && ca.card_no) || '').localeCompare((cb && cb.card_no) || '');
    }
    if (mode === 'rarity') {
      const ra = RARITY_SORT_ORDER[ca && ca.rarity] ?? 99;
      const rb = RARITY_SORT_ORDER[cb && cb.rarity] ?? 99;
      if (ra !== rb) return ra - rb;
      return ((ca && ca.card_no) || '').localeCompare((cb && cb.card_no) || '');
    }
    // 數值排序：srv / blk / tos / atk — 事件牌沒有數值排最後
    const av = (ca && ca[mode]) ?? -1;
    const bv = (cb && cb[mode]) ?? -1;
    if (av !== bv) return bv - av;
    return ((ca && ca.card_no) || '').localeCompare((cb && cb.card_no) || '');
  });

  saveDecks();
  renderDeckPanel();
  showToast(TOAST[mode] || '已整理');
}

// ── Bind Deck Events ────────────────────────────────────
function bindDeckEvents() {
  document.getElementById('tray-open-btn').addEventListener('click', openDeckPanel);
  document.getElementById('tray-analysis-btn').addEventListener('click', openAnalysis);

  document.getElementById('deck-footer-toggle').addEventListener('click', () => {
    const toggle = document.getElementById('deck-footer-toggle');
    const footer = document.getElementById('deck-panel-footer');
    const open = toggle.classList.toggle('open');
    footer.classList.toggle('open', open);
  });

  document.getElementById('deck-panel-close').addEventListener('click', closeDeckPanel);
  document.getElementById('deck-panel-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('deck-panel-overlay')) closeDeckPanel();
  });

  // ── PREVIEW 按鈕 ──────────────────────────────────────
  document.getElementById('deck-preview-img').addEventListener('click', () => {
    if (!deckPreviewSelectedImg) return;
    const card = cards.find(c => c.image_file === deckPreviewSelectedImg);
    if (card) openModal(card);
  });
  document.getElementById('deck-preview-close').addEventListener('click', hideDeckPreview);
  document.getElementById('deck-preview-inc').addEventListener('click', () => {
    if (!deckPreviewSelectedImg) return;
    addCardToDeck(deckPreviewSelectedImg, 1);
    updateDeckInfoText(); updateTray(); renderDeckPanel();
    document.getElementById('deck-preview-count').textContent =
      getCurrentDeck()?.cards.find(c => c.image_file === deckPreviewSelectedImg)?.count ?? '';
  });
  document.getElementById('deck-preview-dec').addEventListener('click', () => {
    if (!deckPreviewSelectedImg) return;
    const deck = getCurrentDeck();
    const entry = deck?.cards.find(c => c.image_file === deckPreviewSelectedImg);
    if (!entry) return;
    if (entry.count > 1) {
      removeCardFromDeck(deckPreviewSelectedImg);
      updateDeckInfoText(); updateTray(); renderDeckPanel();
      document.getElementById('deck-preview-count').textContent =
        getCurrentDeck()?.cards.find(c => c.image_file === deckPreviewSelectedImg)?.count ?? '';
    }
  });
  document.getElementById('deck-preview-remove').addEventListener('click', () => {
    if (!deckPreviewSelectedImg) return;
    const deck = getCurrentDeck();
    if (!deck) return;
    const entry = deck.cards.find(c => c.image_file === deckPreviewSelectedImg);
    if (!entry) return;
    deck.cards = deck.cards.filter(c => c.image_file !== deckPreviewSelectedImg);
    trimCardColorMap(deck.id, deckPreviewSelectedImg, 0);
    saveDecks();
    refreshCardBadge(deckPreviewSelectedImg);
    hideDeckPreview();
    updateTray(); renderGrid();
  });

  document.getElementById('tray-deck-select').addEventListener('change', e => {
    currentDeckId = e.target.value;
    const deck = getCurrentDeck();
    if (deck) document.getElementById('deck-name-input').value = deck.name;
    renderDeckPanel(); updateTray(); renderGrid();
  });

  document.getElementById('deck-rename-btn').addEventListener('click', () => {
    const deck = getCurrentDeck(); if (!deck) return;
    if (deck.id === QUICK_DECK_ID) {
      const name = document.getElementById('deck-name-input').value.trim();
      if (!name) { showToast('請輸入牌組名稱'); return; }
      const newDeck = createDeck(name);
      newDeck.cards = deck.cards.map(c => ({ ...c }));
      deck.cards = [];
      saveDecks(); renderDeckSwitcher(); renderDeckPanel(); updateTray(); renderGrid();
      showToast(`已另存為「${name}」並清空快速查詢`);
      return;
    }
    const name = document.getElementById('deck-name-input').value.trim();
    if (!name) return;
    deck.name = name; saveDecks(); updateTray(); renderDeckSwitcher(); showToast('已重新命名！');
  });
  document.getElementById('deck-name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('deck-rename-btn').click();
  });

  document.getElementById('deck-new-btn').addEventListener('click', () => {
    createDeck(`我的牌組${decks.length + 1}`);
    renderDeckSwitcher(); renderDeckPanel(); updateTray(); renderGrid();
  });

  document.getElementById('deck-delete-btn').addEventListener('click', () => {
    const deck = getCurrentDeck(); if (!deck) return;
    if (deck.id === QUICK_DECK_ID) { showToast('快速查詢牌組不可刪除'); return; }
    if (decks.length <= 1) {
      deck.cards = []; delete deckColorState[deck.id]; saveColorState(); saveDecks(); renderDeckPanel(); updateTray(); renderGrid();
      showToast('牌組已清空'); return;
    }
    const idx = decks.findIndex(d => d.id === currentDeckId);
    delete deckColorState[deck.id]; saveColorState();
    decks.splice(idx, 1);
    currentDeckId = decks[Math.max(0, idx - 1)].id;
    saveDecks(); renderDeckSwitcher(); renderDeckPanel(); updateTray(); renderGrid();
    showToast('已刪除牌組');
  });

  const shareOverlay = document.getElementById('share-modal-overlay');
  const closeShare = () => { shareOverlay.style.display = 'none'; };

  document.getElementById('deck-clear-btn').addEventListener('click', () => {
    const deck = getCurrentDeck();
    if (!deck) return;
    if (deck.cards.length === 0) { showToast('牌組已經是空的'); return; }
    if (!confirm(`確定要清空「${deck.name}」的所有卡片嗎？此動作無法復原。`)) return;
    deck.cards = [];
    deck.owned = {};
    delete deckColorState[deck.id]; saveColorState();
    saveDecks();
    renderDeckPanel(); updateTray(); renderGrid();
    showToast('已清空牌組');
  });

  document.getElementById('deck-share-btn').addEventListener('click', openShareModal);
  document.getElementById('share-modal-close').addEventListener('click', closeShare);
  shareOverlay.addEventListener('click', e => { if (e.target === shareOverlay) closeShare(); });
  document.getElementById('share-copy-btn').addEventListener('click', e => {
    e.stopPropagation();
    navigator.clipboard.writeText(shareUrl)
      .then(() => showToast('連結已複製'))
      .catch(() => showToast('複製失敗，請手動複製'));
  });

  document.getElementById('deck-reorganize-select').addEventListener('change', e => {
    reorganizeDeck(e.target.value);
    e.target.value = e.target.options[0].value; // 執行後重置回第一項
  });
  document.getElementById('deck-color-mode-btn').addEventListener('click', toggleColorMode);
  document.getElementById('deck-color-picker-bar').querySelectorAll('.color-pick-btn').forEach(btn => {
    btn.addEventListener('click', () => applyBatchColor(btn.dataset.colorkey));
  });

  document.getElementById('deck-export-btn').addEventListener('click', exportDecks);

  document.getElementById('deck-import-btn').addEventListener('click', () => {
    document.getElementById('deck-import-file').click();
  });
  document.getElementById('deck-import-file').addEventListener('change', e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        pendingImport = JSON.parse(ev.target.result);
        document.getElementById('import-confirm-overlay').classList.add('open');
      } catch { showToast('JSON 格式錯誤！'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  });
  document.getElementById('import-cancel-btn').addEventListener('click', () => {
    pendingImport = null;
    document.getElementById('import-confirm-overlay').classList.remove('open');
  });
  document.getElementById('import-merge-btn').addEventListener('click',     () => doImport('merge'));
  document.getElementById('import-overwrite-btn').addEventListener('click', () => doImport('overwrite'));

  document.getElementById('analysis-back-btn').addEventListener('click', closeAnalysis);

  // 圖片匯出
  document.getElementById('deck-export-img-btn').addEventListener('click', exportDeckAsImage);

  // 圖片匯入
  document.getElementById('deck-import-img-btn').addEventListener('click', () => {
    document.getElementById('deck-import-img-file').click();
  });
  document.getElementById('deck-import-img-file').addEventListener('change', e => {
    const file = e.target.files[0]; if (!file) return;
    importDeckFromImage(file);
    e.target.value = '';
  });

  // ── Qty Modal events ──
  document.getElementById('qty-cancel').addEventListener('click', closeQtyModal);
  document.getElementById('qty-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('qty-overlay')) closeQtyModal();
  });
  document.getElementById('qty-confirm').addEventListener('click', () => {
    if (!qtyPendingImageFile) return;
    const qty = Math.max(1, parseInt(document.getElementById('qty-input').value, 10) || 1);
    addCardToDeck(qtyPendingImageFile, qty);
    closeQtyModal();
  });
  document.getElementById('qty-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('qty-confirm').click();
    if (e.key === 'Escape') closeQtyModal();
  });
  document.getElementById('qty-minus').addEventListener('click', () => {
    const inp = document.getElementById('qty-input');
    const v = parseInt(inp.value, 10) || 1;
    if (v > 1) inp.value = v - 1;
  });
  document.getElementById('qty-plus').addEventListener('click', () => {
    const inp = document.getElementById('qty-input');
    const v = parseInt(inp.value, 10) || 1;
    const max = parseInt(inp.max, 10) || 40;
    if (v < max) inp.value = v + 1;
  });

  // ── Tray 收合 / 展開 ──
  document.getElementById('tray-toggle-btn').addEventListener('click', () => {
    const tray = document.getElementById('deck-tray');
    const isMini = tray.classList.toggle('mini');
    document.getElementById('tray-toggle-btn').textContent = isMini ? '▲' : '▼';
    document.body.classList.toggle('tray-mini', isMini);
  });
}
</script>
