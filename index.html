<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>排球少年!! バボカ!!BREAK 卡牌資料庫</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface2: #22222f;
    --border: #2e2e40;
    --text: #e8e8f0;
    --text-dim: #8888aa;
    --accent: #6c63ff;
    --accent2: #ff6584;

    /* rarity */
    --r-himitsu: #f0c040;
    --r-top: #c084fc;
    --r-s: #60a5fa;
    --r-r: #4ade80;
    --r-n: #94a3b8;
    --r-d: #fb923c;
    --r-p: #f87171;

    /* school */
    --s-烏野: #f97316;
    --s-音駒: #ef4444;
    --s-稲荷崎: #a855f7;
    --s-白鳥沢: #3b82f6;
    --s-伊達工業: #22c55e;
    --s-青葉城西: #06b6d4;
    --s-梟谷: #a16207;
    --s-鴎台: #8b5cf6;
    --s-other: #64748b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', 'Noto Sans TC', sans-serif;
    min-height: 100vh;
  }

  /* ── Sticky Wrapper ── */
  #sticky-wrapper {
    position: sticky;
    top: 0;
    z-index: 100;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #1a0a2e 0%, #0a1628 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  header h1 { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: 0.5px; }
  header .subtitle { font-size: 12px; color: var(--text-dim); }
  header .count { margin-left: auto; font-size: 13px; color: var(--text-dim); }
  header .count span { color: var(--text); font-weight: 600; }

  /* Filter toggle button (mobile only) */
  .filter-toggle-btn {
    display: none;
    position: relative;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
    flex-shrink: 0;
    transition: border-color 0.2s, color 0.2s;
  }
  .filter-toggle-btn.has-active {
    border-color: var(--accent);
    color: var(--accent);
  }
  .filter-badge {
    background: var(--accent);
    color: #fff;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 5px;
    line-height: 1.4;
  }

  /* ── Filter Panel ── */
  .filter-panel {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }

  .filter-group { display: flex; align-items: center; gap: 6px; }
  .filter-group label { font-size: 12px; color: var(--text-dim); white-space: nowrap; }

  select, input[type="text"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  select:focus, input:focus { border-color: var(--accent); }
  select { cursor: pointer; }

  .search-box { flex: 1; min-width: 180px; max-width: 320px; }

  /* Category toggle buttons */
  .toggle-group { display: flex; gap: 4px; flex-wrap: wrap; }
  .toggle-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .toggle-btn:hover { border-color: var(--accent); color: var(--text); }
  .toggle-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .btn-reset {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-reset:hover { border-color: var(--accent2); color: var(--accent2); }

  /* ── Card Grid ── */
  .grid-container {
    padding: 20px 24px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 14px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    position: relative;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(108,99,255,0.25);
    border-color: var(--accent);
  }

  .card-img-wrap {
    position: relative;
    width: 100%;
    padding-top: 140%; /* roughly card aspect ratio */
    background: var(--surface2);
    overflow: hidden;
  }
  .card-img-wrap img {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transition: opacity 0.2s;
  }
  .card-img-wrap img.error { opacity: 0.3; }
  .img-placeholder {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
  }

  /* Rarity badge */
  .rarity-badge {
    position: absolute;
    top: 6px; right: 6px;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
  }

  .card-info {
    padding: 8px 10px;
  }
  .card-no { font-size: 10px; color: var(--text-dim); margin-bottom: 2px; }
  .card-name { font-size: 13px; font-weight: 600; line-height: 1.3; margin-bottom: 4px; }
  .card-school {
    display: inline-block;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 20px;
    color: #fff;
    font-weight: 600;
  }

  .card-stats {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-top: 6px;
  }
  .stat {
    font-size: 10px;
    padding: 1px 5px;
    background: var(--surface2);
    border-radius: 3px;
    color: var(--text-dim);
  }
  .stat b { color: var(--text); }

  /* ── Empty state ── */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty .icon { font-size: 48px; margin-bottom: 12px; }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(6px);
    z-index: 200;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 16px;
    overflow-y: auto;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: 100%;
    max-width: 680px;
    display: flex;
    gap: 0;
    overflow: hidden;
    position: relative;
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(10px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-close {
    position: absolute;
    top: 12px; right: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 30px; height: 30px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
    z-index: 1;
  }
  .modal-close:hover { background: var(--border); }

  .modal-img {
    width: 220px;
    flex-shrink: 0;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .modal-img img { width: 100%; object-fit: cover; }

  .modal-body {
    padding: 20px 20px 20px 20px;
    flex: 1;
    overflow-y: auto;
    max-height: 80vh;
  }

  .modal-no { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
  .modal-name { font-size: 22px; font-weight: 700; margin-bottom: 8px; line-height: 1.2; }

  .modal-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .tag {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }

  .modal-stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-bottom: 14px;
  }
  .stat-box {
    background: var(--surface2);
    border-radius: 8px;
    padding: 8px 10px;
    text-align: center;
  }
  .stat-box .label { font-size: 10px; color: var(--text-dim); margin-bottom: 2px; }
  .stat-box .value { font-size: 20px; font-weight: 700; }

  .modal-skill-title { font-size: 12px; color: var(--text-dim); margin-bottom: 6px; font-weight: 600; letter-spacing: 0.5px; }
  .modal-skill {
    font-size: 13px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    background: var(--surface2);
    border-radius: 8px;
    padding: 12px 14px;
    border-left: 3px solid var(--accent);
  }

  /* Loading */
  #loading {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    font-size: 16px;
    color: var(--text-dim);
  }
  #loading.hidden { display: none; }

  @media (max-width: 600px) {
    .modal { flex-direction: column; }
    .modal-img { width: 100%; height: 240px; }
    .grid-container { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; }
    header { padding: 12px 16px; }
    .grid-container { padding: 14px 16px; }

    /* Show toggle button on mobile */
    .filter-toggle-btn { display: flex; }

    /* Filter panel: collapsed by default on mobile */
    .filter-panel {
      padding: 0 16px;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease, padding 0.3s ease;
    }

    /* Filter panel: expanded state */
    .filter-panel.open {
      padding: 12px 16px;
      max-height: 600px;
    }
  }

  /* ── Deck: Card Count Input ── */
  .card-count-input {
    position: absolute;
    top: 5px; left: 5px;
    width: 38px;
    padding: 2px 4px;
    text-align: center;
    background: rgba(0,0,0,0.72);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    border-radius: 4px;
    font-size: 12px; font-weight: 700;
    outline: none;
    z-index: 3;
    opacity: 0;
    transition: opacity 0.15s, border-color 0.15s;
    appearance: textfield;
    -moz-appearance: textfield;
  }
  .card-count-input::-webkit-inner-spin-button,
  .card-count-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  /* 有值時常駐顯示，顏色高亮 */
  .card-count-input.has-count {
    opacity: 1;
    color: var(--accent);
    border-color: var(--accent);
  }
  /* 桌面 hover 時顯示（即使值為 0） */
  .card:hover .card-count-input { opacity: 1; }
  .card-count-input:focus { opacity: 1; border-color: var(--accent); }
  /* 手機一律顯示 */
  @media (max-width: 600px) { .card-count-input { opacity: 1; } }

  /* ── Bottom Deck Tray ── */
  .deck-tray {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(135deg, #1a0a2e 0%, #0a1628 100%);
    border-top: 2px solid var(--accent);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 150;
    transform: translateY(100%);
    transition: transform 0.3s ease;
    flex-wrap: nowrap;
  }
  .deck-tray.visible { transform: translateY(0); }
  body.deck-active .grid-container { padding-bottom: 72px; }

  /* 收合狀態：只剩一條細帶 */
  .deck-tray.mini {
    padding: 5px 16px;
    flex-wrap: nowrap;
  }
  .deck-tray.mini .tray-spacer,
  .deck-tray.mini .tray-warn-text,
  .deck-tray.mini #tray-analysis-btn,
  .deck-tray.mini #tray-open-btn { display: none; }
  .deck-tray.mini .tray-deck-select { max-width: none; flex: 1; }
  body.deck-active.tray-mini .grid-container { padding-bottom: 36px; }

  /* 收合/展開切換按鈕 */
  .tray-toggle-btn {
    background: none; border: none; color: var(--text-dim);
    font-size: 14px; cursor: pointer; padding: 2px 4px;
    flex-shrink: 0; line-height: 1; transition: color 0.15s;
  }
  .tray-toggle-btn:hover { color: var(--accent); }

  .tray-deck-select {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 4px 6px;
    font-size: 13px; font-weight: 600;
    cursor: pointer; outline: none;
    max-width: 140px;
    flex-shrink: 1;
    transition: border-color 0.15s;
  }
  .tray-deck-select:hover,
  .tray-deck-select:focus { border-color: var(--accent); }
  .tray-count-label { font-size: 13px; color: var(--text-dim); white-space: nowrap; flex-shrink: 0; }
  .tray-count-num { font-weight: 700; color: var(--accent); }
  .tray-count-num.warn { color: #fb923c; }
  .tray-warn-text { font-size: 11px; color: #fb923c; white-space: nowrap; }
  .tray-spacer { flex: 1; min-width: 4px; }

  .tray-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 6px 11px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .tray-btn:hover { border-color: var(--accent); color: var(--accent); }
  .tray-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tray-btn.primary:hover { opacity: 0.85; color: #fff; }
  .tray-btn.danger:hover { border-color: var(--accent2); color: var(--accent2); }
  .tray-btn:disabled { opacity: 0.4; cursor: default; }

  /* ── Deck Panel (slide-up) ── */
  .deck-panel-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 160;
  }
  .deck-panel-overlay.open { display: block; }

  .deck-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    max-height: 82vh;
    display: flex;
    flex-direction: column;
    z-index: 161;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }

  .deck-panel-header {
    padding: 14px 18px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
  }
  .deck-panel-titlerow {
    display: flex; align-items: center; gap: 8px;
    font-size: 14px; font-weight: 700;
  }
  .deck-selector-row {
    display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
  }
  .deck-switch-select {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px;
    padding: 5px 8px; font-size: 12px; cursor: pointer; outline: none; flex-shrink: 0;
  }
  .deck-name-input {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px;
    padding: 5px 10px; font-size: 13px;
    flex: 1; min-width: 80px; outline: none;
  }
  .deck-name-input:focus { border-color: var(--accent); }
  .deck-panel-info { font-size: 11px; color: var(--text-dim); }
  .deck-panel-info .warn-orange { color: #fb923c; font-weight: 600; }

  .deck-panel-body { flex: 1; overflow-y: auto; padding: 10px 16px; }
  .deck-card-list { display: flex; flex-direction: column; gap: 6px; }
  .deck-empty { text-align: center; padding: 30px 20px; color: var(--text-dim); font-size: 13px; }

  .deck-card-item {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2); border-radius: 8px; padding: 6px 10px;
  }
  .deck-card-item-img {
    width: 32px; height: 45px; object-fit: cover;
    border-radius: 4px; background: var(--border); flex-shrink: 0;
  }
  .deck-card-item-info { flex: 1; min-width: 0; }
  .deck-card-item-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .deck-card-item-sub { font-size: 10px; color: var(--text-dim); }
  .deck-card-item-count { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .count-btn {
    background: var(--border); border: none; color: var(--text);
    width: 22px; height: 22px; border-radius: 4px; font-size: 14px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .count-btn:hover { background: var(--accent); }
  .count-num { font-size: 13px; font-weight: 700; min-width: 18px; text-align: center; }

  .deck-panel-footer {
    padding: 10px 16px; border-top: 1px solid var(--border);
    display: flex; gap: 8px; flex-wrap: wrap; flex-shrink: 0;
  }

  /* ── Analysis Overlay ── */
  .analysis-overlay {
    display: none; position: fixed; inset: 0;
    background: var(--bg); z-index: 170; flex-direction: column;
  }
  .analysis-overlay.open { display: flex; }

  .analysis-header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    flex-wrap: wrap;
  }
  .analysis-title { font-size: 15px; font-weight: 700; flex: 1; min-width: 100px; }
  .analysis-stats { display: flex; gap: 6px; flex-shrink: 0; }
  .analysis-stat {
    font-size: 12px; background: var(--surface2);
    border-radius: 20px; padding: 3px 11px;
  }
  .analysis-stat .num { font-weight: 700; }
  .analysis-stat .num.miss { color: var(--accent2); }

  .analysis-body {
    flex: 1; overflow-y: auto; padding: 20px 24px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 14px; align-content: start;
  }
  @media (max-width: 600px) {
    .analysis-body { padding: 14px 16px; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; }
  }

  .an-card {
    position: relative; border-radius: 10px; overflow: hidden;
    cursor: pointer; border: 2px solid transparent;
    transition: border-color 0.15s, opacity 0.15s;
  }
  .an-card.owned   { border-color: #4ade80; }
  .an-card.partial { border-color: #fb923c; }
  .an-card.not-owned { opacity: 0.35; filter: grayscale(55%); }
  .an-card.not-owned:hover { opacity: 0.6; }

  .an-card-img {
    width: 100%; aspect-ratio: 5/7; object-fit: cover;
    display: block; background: var(--surface2);
  }

  /* 左上角持有數量計數器 */
  .an-own-counter {
    position: absolute; top: 5px; left: 5px;
    display: flex; align-items: center; gap: 2px;
    z-index: 2;
  }
  .an-counter-btn {
    width: 20px; height: 20px;
    background: rgba(0,0,0,0.72); border: 1px solid rgba(255,255,255,0.25);
    border-radius: 4px; color: #fff; font-size: 13px; line-height: 1;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.12s; flex-shrink: 0;
  }
  .an-counter-btn:hover { background: rgba(255,255,255,0.2); }
  .an-counter-num {
    min-width: 22px; text-align: center;
    font-size: 10px; font-weight: 700; color: #fff;
    background: rgba(0,0,0,0.72); border-radius: 3px;
    padding: 2px 3px; line-height: 1.3;
  }
  .an-card.owned   .an-counter-num { color: #4ade80; }
  .an-card.partial .an-counter-num { color: #fb923c; }

  .an-card-name {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    padding: 14px 5px 5px; font-size: 10px; color: #fff;
    text-align: center; line-height: 1.2; pointer-events: none;
  }

  /* ── Qty Modal ── */
  .qty-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.65); z-index: 220;
    justify-content: center; align-items: flex-end;
  }
  .qty-overlay.open { display: flex; }
  .qty-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px 16px 0 0; padding: 20px 20px 28px;
    width: 100%; max-width: 400px;
  }
  .qty-box-name {
    font-size: 14px; font-weight: 700; margin-bottom: 14px;
    color: var(--text); text-align: center;
  }
  .qty-box-row {
    display: flex; align-items: center; gap: 10px;
    justify-content: center; margin-bottom: 16px;
  }
  .qty-box-label { font-size: 13px; color: var(--text-dim); }
  .qty-input {
    width: 80px; padding: 6px 10px; text-align: center;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; font-size: 18px;
    font-weight: 700; outline: none;
  }
  .qty-input:focus { border-color: var(--accent); }
  .qty-input::-webkit-inner-spin-button,
  .qty-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .qty-adj-btn {
    width: 36px; height: 36px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; font-size: 20px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s; flex-shrink: 0;
  }
  .qty-adj-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
  .qty-box-btns { display: flex; gap: 8px; justify-content: center; }

  /* ── Deck count number input ── */
  .deck-count-input {
    width: 52px; padding: 3px 6px; text-align: center;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; font-size: 13px;
    font-weight: 700; outline: none;
  }
  .deck-count-input:focus { border-color: var(--accent); }

  /* ── Analysis count number input ── */
  .an-count-input {
    width: 46px; padding: 2px 4px; text-align: center;
    background: rgba(0,0,0,0.72); border: 1px solid rgba(255,255,255,0.25);
    color: #fff; border-radius: 4px; font-size: 11px;
    font-weight: 700; outline: none; appearance: textfield;
  }
  .an-count-input::-webkit-inner-spin-button,
  .an-count-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .an-count-input:focus { border-color: var(--accent); }
  .an-card.owned   .an-count-input { color: #4ade80; }
  .an-card.partial .an-count-input { color: #fb923c; }

  /* ── Import Confirm Modal ── */
  .import-confirm-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 210;
    justify-content: center; align-items: center;
  }
  .import-confirm-overlay.open { display: flex; }
  .import-confirm-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 22px 20px; width: 90%; max-width: 340px;
  }
  .import-confirm-box h3 { font-size: 15px; margin-bottom: 8px; }
  .import-confirm-box p { font-size: 12px; color: var(--text-dim); margin-bottom: 16px; line-height: 1.6; }
  .import-confirm-btns { display: flex; gap: 8px; justify-content: flex-end; }

  /* Toast */
  #hv-toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 8px 18px; border-radius: 20px;
    font-size: 13px; z-index: 999; opacity: 0;
    transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
  }
</style>
</head>

<script src="cards_data.js"></script>
<script>
// ── Constants ──────────────────────────────────────────────────────────
const RARITY_COLOR = {
  '秘': '#f0c040', '頂': '#c084fc', 'S': '#60a5fa',
  'R': '#4ade80', 'N': '#94a3b8', 'D': '#fb923c', 'P': '#f87171'
};
const RARITY_ORDER = ['秘','頂','S','R','N','D','P'];

const SCHOOL_COLOR = {
  '烏野': '#f97316', '音駒': '#ef4444', '稲荷崎': '#a855f7',
  '白鳥沢': '#3b82f6', '伊達工業': '#22c55e', '青葉城西': '#06b6d4',
  '梟谷': '#a16207', '鴎台': '#8b5cf6'
};

const CATEGORY_ZH = { 'CHARACTER': '角色', 'EVENT': '事件', 'SERVE': '發球' };
const STAT_LABELS = {
  'atk': '攻擊', 'blk': '攔網', 'rcv': '接球',
  'tos': '舉球', 'srv': '發球'
};

// ── State ──────────────────────────────────────────────────────────────
let cards = [];
let filtered = [];
let activeCategory = '';
let activeSeries = '';
let activeSchool = '';
let activeRarity = '';
let searchText = '';

// ── Deck State (宣告在 init 之前，避免 TDZ 錯誤) ──────────────────────
const DECK_LS_KEY  = 'hv_decks';
const MAX_TOTAL    = 40;
const MAX_EVENT    = 8;
let decks               = [];
let currentDeckId       = null;
let pendingImport       = null;
let qtyPendingImageFile = null;

// ── Init ───────────────────────────────────────────────────────────────
function init() {
  cards = CARDS_DATA.cards;
  document.getElementById('count-total').textContent = cards.length;
  document.getElementById('loading').classList.add('hidden');

  loadDecks();
  buildFilters();
  applyFilters();
  bindEvents();
  bindDeckEvents();
  renderDeckSwitcher();
  updateTray();
}

function buildFilters() {
  // Series
  const seriesSet = [...new Set(cards.map(c => c.product_type).filter(Boolean))];
  const seriesLabels = CARDS_DATA.product_labels || {};
  const seriesSel = document.getElementById('filter-series');
  // Use CARDS_DATA product order
  const seriesOrder = ['HV-P01','HV-P02','HV-D01','HV-D02','HV-D03','HVBP','HV-PR'];
  seriesOrder.filter(s => seriesSet.includes(s)).forEach(s => {
    const opt = document.createElement('option');
    opt.value = s;
    opt.textContent = seriesLabels[s] || s;
    seriesSel.appendChild(opt);
  });
  // Any remaining
  seriesSet.filter(s => !seriesOrder.includes(s)).forEach(s => {
    const opt = document.createElement('option');
    opt.value = s;
    opt.textContent = seriesLabels[s] || s;
    seriesSel.appendChild(opt);
  });

  // School
  const schoolSet = [...new Set(cards.map(c => c.school).filter(Boolean))];
  const schoolOrder = ['烏野','音駒','稲荷崎','白鳥沢','伊達工業','青葉城西','梟谷','鴎台'];
  const schoolSel = document.getElementById('filter-school');
  [...schoolOrder.filter(s => schoolSet.includes(s)),
   ...schoolSet.filter(s => !schoolOrder.includes(s)).sort()
  ].forEach(s => {
    const opt = document.createElement('option');
    opt.value = s;
    opt.textContent = s;
    schoolSel.appendChild(opt);
  });

  // Rarity
  const raritySet = [...new Set(cards.map(c => c.rarity).filter(Boolean))];
  const raritySel = document.getElementById('filter-rarity');
  RARITY_ORDER.filter(r => raritySet.includes(r)).forEach(r => {
    const opt = document.createElement('option');
    opt.value = r;
    opt.textContent = r;
    raritySel.appendChild(opt);
  });
}

// ── Events ─────────────────────────────────────────────────────────────
function bindEvents() {
  document.getElementById('search').addEventListener('input', e => {
    searchText = e.target.value.trim().toLowerCase();
    applyFilters();
  });

  document.getElementById('filter-series').addEventListener('change', e => {
    activeSeries = e.target.value;
    applyFilters();
  });

  document.getElementById('filter-school').addEventListener('change', e => {
    activeSchool = e.target.value;
    applyFilters();
  });

  document.getElementById('filter-rarity').addEventListener('change', e => {
    activeRarity = e.target.value;
    applyFilters();
  });

  document.getElementById('filter-category').addEventListener('click', e => {
    const btn = e.target.closest('.toggle-btn');
    if (!btn) return;
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCategory = btn.dataset.val;
    applyFilters();
  });

  document.getElementById('btn-reset').addEventListener('click', () => {
    document.getElementById('search').value = '';
    document.getElementById('filter-series').value = '';
    document.getElementById('filter-school').value = '';
    document.getElementById('filter-rarity').value = '';
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.toggle-btn[data-val=""]').classList.add('active');
    searchText = ''; activeSeries = ''; activeSchool = ''; activeCategory = ''; activeRarity = '';
    applyFilters();
  });

  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  document.getElementById('filter-toggle').addEventListener('click', () => {
    const panel = document.getElementById('filter-panel');
    panel.classList.toggle('open');
  });
}

// ── Filter Logic ───────────────────────────────────────────────────────
function applyFilters() {
  filtered = cards.filter(c => {
    if (activeSeries && c.product_type !== activeSeries) return false;
    if (activeSchool && c.school !== activeSchool) return false;
    if (activeCategory && c.category !== activeCategory) return false;
    if (activeRarity && c.rarity !== activeRarity) return false;
    if (searchText) {
      const haystack = [c.card_no, c.name, c.affiliation, c.skill_zh, c.rarity]
        .filter(Boolean).join(' ').toLowerCase();
      if (!haystack.includes(searchText)) return false;
    }
    return true;
  });

  document.getElementById('count-display').textContent = filtered.length;
  updateFilterBadge();
  renderGrid();
}

function updateFilterBadge() {
  const count = [activeSeries, activeSchool, activeCategory, activeRarity, searchText]
    .filter(Boolean).length;
  const badge = document.getElementById('filter-badge');
  const btn = document.getElementById('filter-toggle');
  if (count > 0) {
    badge.textContent = count;
    badge.style.display = 'inline-block';
    btn.classList.add('has-active');
  } else {
    badge.style.display = 'none';
    btn.classList.remove('has-active');
  }
}

// ── Render ─────────────────────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('card-grid');
  grid.innerHTML = '';

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty"><div class="icon">搜尋無結果</div><div>沒有符合條件的卡牌</div></div>';
    return;
  }

  const frag = document.createDocumentFragment();
  filtered.forEach(card => {
    const el = buildCardEl(card);
    frag.appendChild(el);
  });
  grid.appendChild(frag);
}

function buildCardEl(card) {
  const div = document.createElement('div');
  div.className = 'card';
  div.addEventListener('click', () => openModal(card));

  const rarityColor = RARITY_COLOR[card.rarity] || '#888';
  const schoolColor = SCHOOL_COLOR[card.school] || '#64748b';
  const imgSrc = card.image_file ? `images/${card.image_file}` : '';

  // Stats for CHARACTER cards
  let statsHtml = '';
  if (card.category === 'CHARACTER') {
    const statPairs = [
      ['atk', card.atk], ['blk', card.blk], ['rcv', card.rcv],
      ['tos', card.tos], ['srv', card.srv]
    ].filter(([,v]) => v !== null && v !== undefined && v !== '' && v != 0);
    if (statPairs.length) {
      statsHtml = `<div class="card-stats">${statPairs.map(([k,v]) =>
        `<div class="stat">${STAT_LABELS[k]}<b>${v}</b></div>`
      ).join('')}</div>`;
    }
  }

  const deckCount = getCardCountInDeck(card.image_file);

  div.innerHTML = `
    <div class="card-img-wrap">
      <img src="${imgSrc}" alt="${card.name || ''}" loading="lazy" onerror="this.classList.add('error')">
      <div class="img-placeholder" style="display:none"></div>
      <div class="rarity-badge" style="color:${rarityColor}">${card.rarity || ''}</div>
      <input type="number" class="card-count-input${deckCount > 0 ? ' has-count' : ''}"
        id="input-${card.image_file}"
        data-img="${card.image_file}"
        value="${deckCount > 0 ? deckCount : ''}"
        min="0" max="${MAX_TOTAL}" placeholder="0">
    </div>
    <div class="card-info">
      <div class="card-no">${card.card_no || ''}</div>
      <div class="card-name">${card.name || '（無名稱）'}</div>
      <div class="card-school" style="background:${schoolColor}">${card.school || ''}</div>
      ${statsHtml}
    </div>`;

  const inp = div.querySelector('.card-count-input');
  inp.addEventListener('click',  e => e.stopPropagation());
  inp.addEventListener('focus',  e => e.stopPropagation());
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') inp.blur(); e.stopPropagation(); });

  const saveCount = () => {
    if (!currentDeckId && decks.length === 0) createDeck('我的牌組1');
    const deck = getCurrentDeck();
    if (!deck) return;
    const imgFile = inp.dataset.img;
    const newCount = parseInt(inp.value, 10);
    const cardObj  = cards.find(c => c.image_file === imgFile);
    const existing = deck.cards.find(c => c.image_file === imgFile);
    const existingCount = existing ? existing.count : 0;
    const remaining = MAX_TOTAL - getTotalCount(deck) + existingCount;

    if (isNaN(newCount) || newCount <= 0) {
      // 移除此卡
      const idx = deck.cards.findIndex(c => c.image_file === imgFile);
      if (idx !== -1) deck.cards.splice(idx, 1);
      inp.value = '';
      inp.classList.remove('has-count');
    } else {
      if (newCount > remaining) {
        showToast(`⚠️ 牌組最多還能加 ${remaining} 張！`);
      }
      const final = Math.min(newCount, remaining);
      if (final <= 0) { inp.value = ''; inp.classList.remove('has-count'); saveDecks(); updateTray(); return; }
      if (existing) existing.count = final;
      else deck.cards.push({ image_file: imgFile, card_no: cardObj?.card_no || '', count: final });
      inp.value = final;
      inp.classList.add('has-count');
    }
    saveDecks();
    updateTray();
    if (getEventCount(deck) > MAX_EVENT) setTimeout(() => showToast(`⚠️ 事件卡已超過 ${MAX_EVENT} 張！`), 400);
  };
  inp.addEventListener('change', saveCount);
  inp.addEventListener('blur',   saveCount);

  return div;
}

// ── Modal ──────────────────────────────────────────────────────────────
function openModal(card) {
  const rarityColor = RARITY_COLOR[card.rarity] || '#888';
  const schoolColor = SCHOOL_COLOR[card.school] || '#64748b';

  document.getElementById('modal-no').textContent = card.card_no || '';
  document.getElementById('modal-name').textContent = card.name || '（無名稱）';
  document.getElementById('modal-img').src = card.image_file ? `images/${card.image_file}` : '';

  // Tags
  const tags = [];
  if (card.rarity) tags.push(`<span class="tag" style="color:${rarityColor};border-color:${rarityColor}">${card.rarity}</span>`);
  if (card.school) tags.push(`<span class="tag" style="color:${schoolColor};border-color:${schoolColor}">${card.school}</span>`);
  if (card.category) tags.push(`<span class="tag">${CATEGORY_ZH[card.category] || card.category}</span>`);
  if (card.affiliation) tags.push(`<span class="tag">${card.affiliation}</span>`);
  if (card.product_label) tags.push(`<span class="tag">${card.product_label}</span>`);
  document.getElementById('modal-tags').innerHTML = tags.join('');

  // Stats
  const statsEl = document.getElementById('modal-stats');
  if (card.category === 'CHARACTER') {
    const statDefs = [
      ['atk', '攻擊', '#f87171'], ['blk', '攔網', '#60a5fa'],
      ['rcv', '接球', '#4ade80'], ['tos', '舉球', '#a78bfa'],
      ['srv', '發球', '#fb923c']
    ];
    statsEl.innerHTML = statDefs.map(([k, label, color]) => {
      const v = card[k];
      const val = (v !== null && v !== undefined && v !== '') ? v : '—';
      return `<div class="stat-box"><div class="label">${label}</div><div class="value" style="color:${color}">${val}</div></div>`;
    }).join('');
    statsEl.style.display = 'grid';
  } else {
    statsEl.style.display = 'none';
    statsEl.innerHTML = '';

  // Skill
  const skill = card.skill_zh || card.skill || '';
  const skillEl = document.getElementById('modal-skill');

// ── Persistence ────────────────────────────────────────
function loadDecks() {
  try { const r = localStorage.getItem(DECK_LS_KEY); decks = r ? JSON.parse(r) : []; if (!Array.isArray(decks)) decks = []; } catch { decks = []; }
  // 確保每個牌組都有 owned 欄位（舊資料遷移）
  decks.forEach(d => {
    if (!d.owned) d.owned = {};
    // 遷移：舊格式 { card_no, count } → 新格式 { image_file, card_no, count }
    d.cards = d.cards.map(entry => {
      if (entry.image_file) return entry;  // 已是新格式
      const cardObj = cards.find(c => c.card_no === entry.card_no);
      return {
        image_file: cardObj?.image_file || entry.card_no,
        card_no: entry.card_no,
        count: entry.count
      };
    });
    // 遷移 owned keys：舊格式用 card_no，新格式用 image_file
    const newOwned = {};
    Object.entries(d.owned).forEach(([key, val]) => {
      if (key.includes('.webp')) {
        newOwned[key] = val;  // 已是新格式
      } else {
        const c = cards.find(x => x.card_no === key);
        if (c) newOwned[c.image_file] = val;
      }
    });
    d.owned = newOwned;
  });
  if (decks.length > 0) currentDeckId = decks[0].id;
}
function saveDecks() { localStorage.setItem(DECK_LS_KEY, JSON.stringify(decks)); }

// 取得當前牌組的持有資料（per-deck）
function getDeckOwned() {
  const deck = getCurrentDeck();
  if (!deck) return {};
  if (!deck.owned) deck.owned = {};
  return deck.owned;
}

// ── Deck helpers ───────────────────────────────────────
function getCurrentDeck() { return decks.find(d => d.id === currentDeckId) || null; }
function makeDeckId()     { return 'dk_' + Date.now() + '_' + Math.random().toString(36).slice(2,6); }

function createDeck(name) {
  const d = { id: makeDeckId(), name: name || '新牌組', cards: [], owned: {} };
  decks.push(d);
  currentDeckId = d.id;
  saveDecks();
  renderDeckSwitcher();
  return d;
}

function getTotalCount(deck) { return deck.cards.reduce((s,c) => s + c.count, 0); }

function getEventCount(deck) {
  return deck.cards.reduce((s, c) => {
    const card = cards.find(x => x.image_file === c.image_file);
    return s + (card && card.category === 'EVENT' ? c.count : 0);
  }, 0);
}

function getCardCountInDeck(image_file) {
  const deck = getCurrentDeck();
  if (!deck) return 0;
  const e = deck.cards.find(c => c.image_file === image_file);
  return e ? e.count : 0;
}

// ── Add / Remove ───────────────────────────────────────
function addCardToDeck(image_file, quantity = 1) {
  if (!image_file) { showToast('錯誤：image_file 無效'); return; }
  if (!currentDeckId && decks.length === 0) createDeck('我的牌組1');
  const deck = getCurrentDeck();
  if (!deck) return;
  const currentTotal = getTotalCount(deck);
  const qty = Math.min(quantity, MAX_TOTAL - currentTotal);
  if (qty <= 0) { showToast('牌組已達 40 張上限！'); return; }
  const cardObj = cards.find(c => c.image_file === image_file);
  const entry = deck.cards.find(c => c.image_file === image_file);
  if (entry) entry.count += qty;
  else deck.cards.push({ image_file, card_no: cardObj?.card_no || '', count: qty });
  saveDecks();
  refreshCardBadge(image_file);
  updateTray();
  const nm = cardObj ? cardObj.name : image_file;
  showToast(`＋${qty} ${nm}`);
  if (getEventCount(deck) > MAX_EVENT) setTimeout(() => showToast(`⚠️ 事件卡已超過 ${MAX_EVENT} 張！`), 600);
}

function removeCardFromDeck(image_file) {
  const deck = getCurrentDeck();
  if (!deck) return;
  const idx = deck.cards.findIndex(c => c.image_file === image_file);
  if (idx === -1) return;
  if (deck.cards[idx].count > 1) deck.cards[idx].count--;
  else deck.cards.splice(idx, 1);
  saveDecks();
  refreshCardBadge(image_file);
  updateTray();
}

function refreshCardBadge(image_file) {
  const inp = document.getElementById(`input-${image_file}`);
  if (!inp) return;
  const n = getCardCountInDeck(image_file);
  inp.value = n > 0 ? n : '';
  inp.classList.toggle('has-count', n > 0);
}

// ── Tray ───────────────────────────────────────────────
function updateTray() {
  const deck = getCurrentDeck();
  const tray = document.getElementById('deck-tray');
  if (!deck) { tray.classList.remove('visible'); document.body.classList.remove('deck-active'); return; }
  tray.classList.add('visible');
  document.body.classList.add('deck-active');

  document.getElementById('tray-deck-select').value = currentDeckId;
  const total = getTotalCount(deck);
  const numEl = document.getElementById('tray-count-num');
  numEl.textContent = total;
  numEl.className = 'tray-count-num' + (total >= MAX_TOTAL ? ' warn' : '');

  const warnEl = document.getElementById('tray-warn-text');
  const evCnt  = getEventCount(deck);
  const warns  = [];
  if (total >= MAX_TOTAL) warns.push('已滿');
  if (evCnt > MAX_EVENT)  warns.push(`事件 ${evCnt}/8`);
  warnEl.textContent = warns.join(' · ');
  warnEl.style.display = warns.length ? 'inline' : 'none';
}

// ── Deck Panel ─────────────────────────────────────────
function openDeckPanel() {
  if (decks.length === 0) createDeck('我的牌組1');
  renderDeckSwitcher();
  renderDeckPanel();
  document.getElementById('deck-panel-overlay').classList.add('open');
}
function closeDeckPanel() { document.getElementById('deck-panel-overlay').classList.remove('open'); }

function renderDeckSwitcher() {
  // tray 下拉選單
  const traySel = document.getElementById('tray-deck-select');
  traySel.innerHTML = '';
  decks.forEach(d => {
    const o = document.createElement('option');
    o.value = d.id; o.textContent = d.name; o.selected = d.id === currentDeckId;
    traySel.appendChild(o);
  });
  // 管理面板的改名欄位
  const deck = getCurrentDeck();
  if (deck) document.getElementById('deck-name-input').value = deck.name;
}

function renderDeckPanel() {
  const deck = getCurrentDeck();
  const list = document.getElementById('deck-card-list');
  const info = document.getElementById('deck-panel-info');

  if (!deck || deck.cards.length === 0) {
    list.innerHTML = '<div class="deck-empty">牌組是空的，到卡片列表按「＋」加入卡片</div>';
    info.textContent = '';
    return;
  }

  const total = getTotalCount(deck);
  const evCnt = getEventCount(deck);
  const warns = [];
  if (total >= MAX_TOTAL) warns.push('已達上限');
  if (evCnt > MAX_EVENT)  warns.push(`事件卡 ${evCnt}/8（超限）`);
  info.innerHTML = `共 ${total}/40 張` + (warns.length ? `　<span class="warn-orange">${warns.join(' · ')}</span>` : '');

  list.innerHTML = '';
  deck.cards.forEach(entry => {
    const card = cards.find(c => c.image_file === entry.image_file);
    if (!card) return;
    const item = document.createElement('div');
    item.className = 'deck-card-item';
    const imgSrc = card.image_file ? `images/${card.image_file}` : '';
    const rc = RARITY_COLOR[card.rarity] || '#888';
    const variant = getVariantCode(entry.image_file);
    const displayName = (card.name || '（無名稱）') + (variant ? ` (${variant})` : '');
    item.innerHTML = `
      <img class="deck-card-item-img" src="${imgSrc}" alt="" onerror="this.style.background='var(--border)'">
      <div class="deck-card-item-info">
        <div class="deck-card-item-name">${displayName}</div>
        <div class="deck-card-item-sub" style="color:${rc}">${card.rarity || ''} · ${card.card_no}</div>
      </div>
      <div class="deck-card-item-count">
        <button class="count-btn" data-action="dec" data-img="${entry.image_file}">−</button>
        <input type="number" class="deck-count-input" data-img="${entry.image_file}" value="${entry.count}" min="1" max="${MAX_TOTAL}">
        <button class="count-btn" data-action="inc" data-img="${entry.image_file}">＋</button>
      </div>`;
    list.appendChild(item);
  });

  // 事件委派：+/- 按鈕
  list.querySelectorAll('.count-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const img = btn.dataset.img;
      if (btn.dataset.action === 'inc') addCardToDeck(img, 1);
      else removeCardFromDeck(img);
      renderDeckPanel();
    });
  });

  // 事件委派：數字輸入
  list.querySelectorAll('.deck-count-input').forEach(input => {
    input.addEventListener('change', e => {
      const img = input.dataset.img;
      const newCount = parseInt(input.value, 10);
      if (isNaN(newCount) || newCount < 1) { input.value = 1; return; }
      const d = getCurrentDeck();
      if (!d) return;
      const entry = d.cards.find(c => c.image_file === img);
      if (!entry) return;
      const otherTotal = getTotalCount(d) - entry.count;
      entry.count = Math.min(newCount, MAX_TOTAL - otherTotal);
      input.value = entry.count;
      saveDecks();
      refreshCardBadge(img);
      updateTray();
      const info = document.getElementById('deck-panel-info');
      const total2 = getTotalCount(d);
      const warns = [];
      if (total2 >= MAX_TOTAL) warns.push('已達上限');
      if (getEventCount(d) > MAX_EVENT) warns.push(`事件卡超限`);
      info.innerHTML = `共 ${total2}/40 張` + (warns.length ? `　<span class="warn-orange">${warns.join(' · ')}</span>` : '');
    });
  });
}

function exportDecks() {
  const date = new Date().toISOString().slice(0,10);
  const data = { version: 2, exported: new Date().toISOString(), decks };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });

  URL.revokeObjectURL(url);

function doImport(mode) {
  if (!pendingImport) return;
  const { decks: iDecks = [] } = pendingImport;
  pendingImport = null;
  // 確保匯入的牌組都有 owned 欄位
  iDecks.forEach(d => { if (!d.owned) d.owned = {}; });
  if (mode === 'overwrite') {
    decks = iDecks;
    currentDeckId = decks.length ? decks[0].id : null;
  } else {
    iDecks.forEach(d => { if (!decks.find(x => x.id === d.id)) decks.push(d); });
    if (!currentDeckId && decks.length) currentDeckId = decks[0].id;
  }
  saveDecks();
  renderDeckSwitcher(); renderDeckPanel(); updateTray(); renderGrid();
  document.getElementById('import-confirm-overlay').classList.remove('open');
  showToast('匯入成功！');
}

function openAnalysis() {
  const deck = getCurrentDeck();
  if (!deck || deck.cards.length === 0) { showToast('牌組是空的！'); return; }
  renderAnalysis();

function renderAnalysis() {
  const deck = getCurrentDeck();
  if (!deck) return;
  document.getElementById('analysis-title').textContent = `庫存分析 — ${deck.name}`;

  // 缺牌數 = Σ max(0, 牌組需要 − 此牌組的持有數)
  const total = getTotalCount(deck);
  const owned = getDeckOwned();   // 此牌組專屬持有資料（以 image_file 為 key）
  let missing = 0;
  deck.cards.forEach(e => {
    missing += Math.max(0, e.count - (owned[e.image_file] || 0));
  });
  document.getElementById('analysis-total').textContent   = total;
  document.getElementById('analysis-missing').textContent = missing;

  const body = document.getElementById('analysis-body');
  body.innerHTML = '';
  deck.cards.forEach(entry => {
    const card = cards.find(c => c.image_file === entry.image_file);
    if (!card) return;

    const have   = owned[entry.image_file] || 0;
    const need   = entry.count;
    const state  = have >= need ? 'owned' : have > 0 ? 'partial' : 'not-owned';
    const imgSrc = card.image_file ? `images/${card.image_file}` : '';
    const variant = getVariantCode(entry.image_file);
    const displayName = (card.name || '') + (variant ? ` (${variant})` : '');

    const div = document.createElement('div');
    div.className = `an-card ${state}`;
    div.innerHTML = `
      <img class="an-card-img" src="${imgSrc}" alt="" onerror="this.style.background='var(--surface2)'">
      <div class="an-own-counter">
        <input type="number" class="an-count-input" data-img="${entry.image_file}" data-need="${need}" value="${have}" min="0" title="持有數（需要 ${need} 張）">
      </div>
      <div class="an-card-name">${displayName}</div>`;

    div.querySelector('.an-count-input').addEventListener('click', e => e.stopPropagation());
    div.querySelector('.an-count-input').addEventListener('focus', e => { e.stopPropagation(); e.target.value = ''; });

    // 共用的儲存邏輯：change（含 Enter）或 blur（離開欄位）都觸發
    const saveAnCount = e => {
      e.stopPropagation();
      const img = e.target.dataset.img;
      const val = parseInt(e.target.value, 10);
      deck.owned[img] = isNaN(val) || val < 0 ? 0 : val;
      e.target.value = deck.owned[img];   // 修正顯示（如輸入負數）
      saveDecks();
      // 更新此卡的 state class（不 re-render 整頁，避免失焦）
      const have2 = deck.owned[img] || 0;
      const need2 = parseInt(e.target.dataset.need, 10);
      div.className = `an-card ${have2 >= need2 ? 'owned' : have2 > 0 ? 'partial' : 'not-owned'}`;
      // 更新標頭統計
      let missing2 = 0;
      deck.cards.forEach(en => { missing2 += Math.max(0, en.count - (deck.owned[en.image_file] || 0)); });
      document.getElementById('analysis-missing').textContent = missing2;
    };
    div.querySelector('.an-count-input').addEventListener('change', saveAnCount);
    div.querySelector('.an-count-input').addEventListener('blur',   saveAnCount);
    div.addEventListener('click', () => openModal(card));
    body.appendChild(div);
  });
}

// ══════════════════════════════════════════════════════
// PNG 圖片匯出 / 匯入
// ══════════════════════════════════════════════════════

const PNG_KEYWORD = 'HVBreakDeck';

// CRC32 查表（PNG chunk 必需）
const CRC32_TABLE = (() => {
  const t = new Uint32Array(256);
  for (let i = 0; i < 256; i++) {
    let c = i;
    for (let j = 0; j < 8; j++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
    t[i] = c;
  }
  return t;
})();

function crc32(buf) {
  let crc = 0xFFFFFFFF;
  for (let i = 0; i < buf.length; i++) crc = CRC32_TABLE[(crc ^ buf[i]) & 0xFF] ^ (crc >>> 8);
  return (crc ^ 0xFFFFFFFF) >>> 0;
}

// 把 tEXt chunk 注入 PNG bytes（插在第一個 IDAT 之前）
function injectPngChunk(pngBytes, keyword, text) {
  const enc = new TextEncoder();
  const kw  = enc.encode(keyword);
  const tx  = enc.encode(text);
  const data = new Uint8Array(kw.length + 1 + tx.length);
  data.set(kw); data[kw.length] = 0; data.set(tx, kw.length + 1);

  const typeArr = new Uint8Array([116,69,88,116]); // 'tEXt'
  const crcIn   = new Uint8Array(4 + data.length);
  crcIn.set(typeArr); crcIn.set(data, 4);
  const crcVal  = crc32(crcIn);

  const chunk = new Uint8Array(12 + data.length);
  const dv    = new DataView(chunk.buffer);
  dv.setUint32(0, data.length, false);
  chunk.set(typeArr, 4);
  chunk.set(data, 8);
  dv.setUint32(8 + data.length, crcVal, false);

  // 找 IDAT 位置
  let pos = 8;
  while (pos + 8 <= pngBytes.length) {
    const len  = new DataView(pngBytes.buffer, pngBytes.byteOffset + pos).getUint32(0, false);
    const type = String.fromCharCode(pngBytes[pos+4], pngBytes[pos+5], pngBytes[pos+6], pngBytes[pos+7]);
    if (type === 'IDAT') break;
    pos += 12 + len;
  }

  const out = new Uint8Array(pngBytes.length + chunk.length);
  out.set(pngBytes.slice(0, pos));
  out.set(chunk, pos);
  out.set(pngBytes.slice(pos), pos + chunk.length);
  return out;
}

// 從 PNG bytes 讀取我們的 tEXt chunk
function readPngChunk(pngBytes, keyword) {
  const dec = new TextDecoder();
  let pos = 8;
  while (pos + 8 <= pngBytes.length) {
    const dv   = new DataView(pngBytes.buffer, pngBytes.byteOffset + pos);
    const len  = dv.getUint32(0, false);
    const type = String.fromCharCode(pngBytes[pos+4], pngBytes[pos+5], pngBytes[pos+6], pngBytes[pos+7]);
    if (type === 'IEND') break;
    if (type === 'tEXt' && pos + 8 + len <= pngBytes.length) {
      const data = pngBytes.slice(pos + 8, pos + 8 + len);
      const sep  = data.indexOf(0);
      if (sep !== -1 && dec.decode(data.slice(0, sep)) === keyword) {
        return dec.decode(data.slice(sep + 1));
      }
    }
    pos += 12 + len;
  }
  return null;
}

// 圓角矩形輔助（相容舊瀏覽器）
function canvasRoundRect(ctx, x, y, w, h, r) {
  const [tl, tr, br, bl] = typeof r === 'number' ? [r,r,r,r] : r;
  ctx.beginPath();
  ctx.moveTo(x + tl, y);
  ctx.lineTo(x + w - tr, y);   ctx.quadraticCurveTo(x+w, y,   x+w, y+tr);
  ctx.lineTo(x + w, y + h - br); ctx.quadraticCurveTo(x+w, y+h, x+w-br, y+h);
  ctx.lineTo(x + bl, y + h);   ctx.quadraticCurveTo(x,   y+h, x,   y+h-bl);
  ctx.lineTo(x, y + tl);       ctx.quadraticCurveTo(x,   y,   x+tl, y);
  ctx.closePath();
}

// 畫牌組 Canvas（高解析度）
async function drawDeckCanvas(deck) {
  const SCALE  = 3;          // 3x 高解析度
  const entries = deck.cards;

  // 欄數：≤5張用實際張數寬度，>5張固定5欄
  const COLS   = Math.min(5, entries.length);

  const CARD_W = 100;        // 邏輯尺寸（實際 ×SCALE）
  const CARD_H = 140;
  const GAP    = 10;
  const PAD    = 20;
  const HEAD_H = 72;
  const FOOT_H = 34;

  const rows = Math.ceil(entries.length / COLS);
  const W    = PAD*2 + COLS*(CARD_W+GAP) - GAP;
  const H    = HEAD_H + PAD + rows*(CARD_H+GAP) - GAP + PAD + FOOT_H;

  const canvas  = document.createElement('canvas');
  canvas.width  = W * SCALE;
  canvas.height = H * SCALE;
  const ctx     = canvas.getContext('2d');
  ctx.scale(SCALE, SCALE);               // 之後所有座標用邏輯尺寸即可
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';

  // 背景
  ctx.fillStyle = '#0f0f13';
  ctx.fillRect(0, 0, W, H);

  // 標題列
  ctx.fillStyle = '#13091f';
  ctx.fillRect(0, 0, W, HEAD_H);
  ctx.fillStyle = '#6c63ff';
  ctx.fillRect(0, HEAD_H - 2, W, 2);

  ctx.font = 'bold 15px "Segoe UI","Noto Sans TC",sans-serif';
  ctx.fillStyle = '#6c63ff';
  ctx.fillText('排球少年!! バボカ!!BREAK', PAD, 27);

  ctx.font = 'bold 17px "Segoe UI","Noto Sans TC",sans-serif';
  ctx.fillStyle = '#e8e8f0';
  ctx.fillText(deck.name, PAD, 54);

  ctx.font = '11px "Segoe UI",sans-serif';
  ctx.fillStyle = '#8888aa';
  ctx.textAlign = 'right';
  ctx.fillText(`共 ${getTotalCount(deck)} 張`, W - PAD, 27);
  ctx.textAlign = 'left';

  // 載入圖片（快取避免重複請求）
  const imgCache = {};
  const loadImg  = src => {
    if (imgCache[src]) return imgCache[src];
    imgCache[src] = new Promise(res => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload  = () => res(img);
      img.onerror = () => res(null);
      img.src = src;
    });
    return imgCache[src];
  };

  for (let i = 0; i < entries.length; i++) {
    const entry = entries[i];
    const card  = cards.find(c => c.image_file === entry.image_file);
    if (!card) continue;

    const col = i % COLS;
    const row = Math.floor(i / COLS);
    const x   = PAD + col * (CARD_W + GAP);
    const y   = HEAD_H + PAD + row * (CARD_H + GAP);

    // 卡片底色
    ctx.fillStyle = '#1a1a24';
    canvasRoundRect(ctx, x, y, CARD_W, CARD_H, 7); ctx.fill();

    // 卡片圖片
    if (card.image_file) {
      const img = await loadImg(`images/${card.image_file}`);
      if (img) {
        ctx.save();
        canvasRoundRect(ctx, x, y, CARD_W, CARD_H, 7); ctx.clip();
        ctx.drawImage(img, x, y, CARD_W, CARD_H);
        ctx.restore();
      }
    }

    // 底部漸層＋卡名
    const grad = ctx.createLinearGradient(x, y + CARD_H - 36, x, y + CARD_H);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(0,0,0,0.9)');
    ctx.fillStyle = grad;
    canvasRoundRect(ctx, x, y + CARD_H - 36, CARD_W, 36, [0,0,7,7]); ctx.fill();

    ctx.font = '10px "Segoe UI","Noto Sans TC",sans-serif';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    const variant = getVariantCode(entry.image_file);
    const nm = (card.card_no || '') + (variant ? `-${variant}` : '');
    ctx.fillText(nm, x + CARD_W/2, y + CARD_H - 8);
    ctx.textAlign = 'left';

    // 數量徽章（>1 才顯示）
    if (entry.count > 1) {
      const bw = 22, bh = 17;
      ctx.fillStyle = 'rgba(108,99,255,0.92)';
      canvasRoundRect(ctx, x + CARD_W - bw - 4, y + 4, bw, bh, 5); ctx.fill();
      ctx.font = 'bold 11px "Segoe UI",sans-serif';
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.fillText(`×${entry.count}`, x + CARD_W - bw/2 - 4, y + 15);
      ctx.textAlign = 'left';
    }
  }

  // 頁尾
  ctx.fillStyle = '#2e2e40';
  ctx.fillRect(0, H - FOOT_H, W, 1);
  ctx.font = '10px "Segoe UI",sans-serif';
  ctx.fillStyle = '#44445a';
  ctx.textAlign = 'center';
  ctx.fillText(
    `weilun2022.github.io/haikyuu-cards  ·  ${new Date().toLocaleDateString('zh-TW')}`,
    W/2, H - 11
  );
  ctx.textAlign = 'left';

  return canvas;
}

// 匯出圖片（PNG + 嵌入牌組資料）
async function exportDeckAsImage() {
  const deck = getCurrentDeck();
  if (!deck || deck.cards.length === 0) { showToast('牌組是空的！'); return; }

  showToast('圖片生成中...');
  try {
    const canvas  = await drawDeckCanvas(deck);
    const dataUrl = canvas.toDataURL('image/png');
    const bin     = atob(dataUrl.split(',')[1]);
    const bytes   = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);

    const payload  = JSON.stringify({ name: deck.name, cards: deck.cards });
    const injected = injectPngChunk(bytes, PNG_KEYWORD, payload);

    const blob = new Blob([injected], { type: 'image/png' });
    const url  = URL.createObjectURL(blob);
    const safe = deck.name.replace(/[^\w\u4e00-\u9fff\-]/g, '_');
    Object.assign(document.createElement('a'), {
      href: url,
      download: `HVBreak-${safe}-${new Date().toISOString().slice(0,10)}.png`
    }).click();
    URL.revokeObjectURL(url);
    showToast('圖片已下載！');
  } catch(e) {
    console.error(e);
    showToast('圖片生成失敗，請確認主控台訊息');
  }
}

// 從圖片匯入牌組
async function importDeckFromImage(file) {
  try {
    const buf      = await file.arrayBuffer();
    const bytes    = new Uint8Array(buf);
    const SIG      = [137,80,78,71,13,10,26,10];
    const validPng = SIG.every((b,i) => bytes[i] === b);
    if (!validPng) { showToast('不是有效的 PNG 圖片'); return; }

    const text = readPngChunk(bytes, PNG_KEYWORD);
    if (!text) { showToast('此圖片不含牌組資料'); return; }

    const data = JSON.parse(text);
    if (!Array.isArray(data.cards)) { showToast('牌組資料格式錯誤'); return; }

    const newDeck = { id: makeDeckId(), name: data.name || '匯入的牌組', cards: data.cards, owned: {} };
    decks.push(newDeck);
    currentDeckId = newDeck.id;
    saveDecks();
    renderDeckSwitcher(); renderDeckPanel(); updateTray(); renderGrid();
    showToast(`已匯入「${newDeck.name}」！`);
  } catch(e) {
    console.error(e);
    showToast('匯入失敗');
  }
}

// ── Variant Code Helper ─────────────────────────────────
// 從 image_file 萃取變體碼，例如 HV-P01-004-KP.webp → "KP"
// 若最後片段是純數字（非特殊版本）就回傳空字串
function getVariantCode(image_file) {
  if (!image_file) return '';
  const m = image_file.match(/-([^-]+)\.webp$/i);
  if (!m) return '';
  const code = m[1];
  return /^\d+$/.test(code) ? '' : code;  // 純數字表示無特殊版本
}

// ── Qty Modal ───────────────────────────────────────────
function openQtyModal(image_file) {
  if (!image_file) return;
  qtyPendingImageFile = image_file;
  const cardObj = cards.find(c => c.image_file === image_file);
  const variant = getVariantCode(image_file);
  const nm = (cardObj ? cardObj.name : image_file) + (variant ? ` (${variant})` : '');
  document.getElementById('qty-modal-name').textContent = nm;
  const deck = getCurrentDeck();
  const remaining = deck ? MAX_TOTAL - getTotalCount(deck) : MAX_TOTAL;
  const input = document.getElementById('qty-input');
  input.value = 1;
  input.max = Math.max(1, remaining);
  document.getElementById('qty-overlay').classList.add('open');
  setTimeout(() => input.select(), 50);
}

function closeQtyModal() {
  qtyPendingImageFile = null;
  document.getElementById('qty-overlay').classList.remove('open');
}

// ── Bind Deck Events ────────────────────────────────────
function bindDeckEvents() {
  document.getElementById('tray-open-btn').addEventListener('click', openDeckPanel);
  document.getElementById('tray-analysis-btn').addEventListener('click', openAnalysis);

  document.getElementById('deck-panel-close').addEventListener('click', closeDeckPanel);
  document.getElementById('deck-panel-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('deck-panel-overlay')) closeDeckPanel();
  });

  document.getElementById('tray-deck-select').addEventListener('change', e => {
    currentDeckId = e.target.value;
    const deck = getCurrentDeck();
    if (deck) document.getElementById('deck-name-input').value = deck.name;
    renderDeckPanel(); updateTray(); renderGrid();
  });

  document.getElementById('deck-rename-btn').addEventListener('click', () => {
    const deck = getCurrentDeck(); if (!deck) return;
    const name = document.getElementById('deck-name-input').value.trim();
    if (!name) return;
    deck.name = name; saveDecks(); updateTray(); renderDeckSwitcher(); showToast('已重新命名！');
  });
  document.getElementById('deck-name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('deck-rename-btn').click();
  });

  document.getElementById('deck-new-btn').addEventListener('click', () => {
    createDeck(`我的牌組${decks.length + 1}`);
    renderDeckSwitcher(); renderDeckPanel(); updateTray(); renderGrid();
  });

  document.getElementById('deck-delete-btn').addEventListener('click', () => {
    const deck = getCurrentDeck(); if (!deck) return;
    if (decks.length <= 1) {
      deck.cards = []; saveDecks(); renderDeckPanel(); updateTray(); renderGrid();
      showToast('牌組已清空'); return;
    }
    const idx = decks.findIndex(d => d.id === currentDeckId);
    decks.splice(idx, 1);
    currentDeckId = decks[Math.max(0, idx - 1)].id;
    saveDecks(); renderDeckSwitcher(); renderDeckPanel(); updateTray(); renderGrid();
    showToast('已刪除牌組');
  });

  document.getElementById('deck-export-btn').addEventListener('click', exportDecks);

  document.getElementById('deck-import-btn').addEventListener('click', () => {
    document.getElementById('deck-import-file').click();
  });
  document.getElementById('deck-import-file').addEventListener('change', e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        pendingImport = JSON.parse(ev.target.result);
        document.getElementById('import-confirm-overlay').classList.add('open');
      } catch { showToast('JSON 格式錯誤！'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  });
  document.getElementById('import-cancel-btn').addEventListener('click', () => {
    pendingImport = null;
    document.getElementById('import-confirm-overlay').classList.remove('open');
  });
  document.getElementById('import-merge-btn').addEventListener('click',     () => doImport('merge'));
  document.getElementById('import-overwrite-btn').addEventListener('click', () => doImport('overwrite'));

  document.getElementById('analysis-back-btn').addEventListener('click', closeAnalysis);

  // 圖片匯出
  document.getElementById('deck-export-img-btn').addEventListener('click', exportDeckAsImage);

  // 圖片匯入
  document.getElementById('deck-import-img-btn').addEventListener('click', () => {
    document.getElementById('deck-import-img-file').click();
  });
  document.getElementById('deck-import-img-file').addEventListener('change', e => {
    const file = e.target.files[0]; if (!file) return;
    importDeckFromImage(file);
    e.target.value = '';
  });

  // ── Qty Modal events ──
  document.getElementById('qty-cancel').addEventListener('click', closeQtyModal);
  document.getElementById('qty-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('qty-overlay')) closeQtyModal();
  });
  document.getElementById('qty-confirm').addEventListener('click', () => {
    if (!qtyPendingImageFile) return;
    const qty = Math.max(1, parseInt(document.getElementById('qty-input').value, 10) || 1);
    addCardToDeck(qtyPendingImageFile, qty);
    closeQtyModal();
  });
  document.getElementById('qty-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('qty-confirm').click();
    if (e.key === 'Escape') closeQtyModal();
  });
  document.getElementById('qty-minus').addEventListener('click', () => {
    const inp = document.getElementById('qty-input');
    const v = parseInt(inp.value, 10) || 1;
    if (v > 1) inp.value = v - 1;
  });
  document.getElementById('qty-plus').addEventListener('click', () => {
    const inp = document.getElementById('qty-input');
    const v = parseInt(inp.value, 10) || 1;
    const max = parseInt(inp.max, 10) || 40;
    if (v < max) inp.value = v + 1;
  });

  // ── Tray 收合 / 展開 ──
  document.getElementById('tray-toggle-btn').addEventListener('click', () => {
    const tray = document.getElementById('deck-tray');
    const isMini = tray.classList.toggle('mini');
    document.getElementById('tray-toggle-btn').textContent = isMini ? '▲' : '▼';
    document.body.classList.toggle('tray-mini', isMini);
  });
}
</script>
